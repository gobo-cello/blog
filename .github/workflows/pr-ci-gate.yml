name: PR CI Gate
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  biome:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
      - run: npx biome ci --reporter=github .

  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
        with:
          working-directory: infra
      - working-directory: infra
        run: npm run build

  jest:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
        with:
          working-directory: infra
      - working-directory: infra
        run: npm test

  cdk-synth:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
        with:
          working-directory: infra
      - working-directory: infra
        run: npx cdk synth
        env:
          AWS_BLOG_SANDBOX_ACCOUNT_ID: '111111111111'
          AWS_BLOG_PRODUCTION_ACCOUNT_ID: '222222222222'

  cdk-diff:
    runs-on: ubuntu-slim
    environment: sandbox
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
        with:
          working-directory: infra
      - name: Debug OIDC token claims
        run: |
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$JWT" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null | jq '{sub, aud, ref, environment, repository, repository_owner, job_workflow_ref}'
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_BLOG_SANDBOX_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1
      - working-directory: infra
        run: npx cdk diff SandboxGithubDeployRoleStack
        env:
          AWS_BLOG_SANDBOX_ACCOUNT_ID: ${{ vars.AWS_BLOG_SANDBOX_ACCOUNT_ID }}
          AWS_BLOG_PRODUCTION_ACCOUNT_ID: ${{ vars.AWS_BLOG_PRODUCTION_ACCOUNT_ID }}

  pr-ci-gate:
    needs:
      - biome
      - build
      - jest
      - cdk-synth
      - cdk-diff
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-slim
    steps:
      - name: Verify CI results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS" | jq -e '
            all(
              .[];
              .result == "success" or .result == "skipped"
            )
          '
