name: Deploy
on:
  push:
    branches:
      - main
    paths:
      - app/**
      - infra/**
      - .github/workflows/deploy.yml
      - .github/actions/setup-node-npm/**

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sandbox:
    runs-on: ubuntu-slim
    environment: sandbox
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
        with:
          working-directory: infra
      - uses: ./.github/actions/setup-node-npm
        with:
          working-directory: app
      - name: Build app
        working-directory: app
        run: npm run build
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_BLOG_SANDBOX_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1
      - name: Deploy SandboxGithubDeployRoleStack
        working-directory: infra
        run: npx cdk deploy SandboxGithubDeployRoleStack --require-approval never
        env:
          AWS_BLOG_SANDBOX_ACCOUNT_ID: ${{ vars.AWS_BLOG_SANDBOX_ACCOUNT_ID }}
          AWS_BLOG_PRODUCTION_ACCOUNT_ID: ${{ vars.AWS_BLOG_PRODUCTION_ACCOUNT_ID }}
      - name: Deploy SandboxDnsStack
        working-directory: infra
        run: npx cdk deploy SandboxDnsStack --require-approval never
        env:
          AWS_BLOG_SANDBOX_ACCOUNT_ID: ${{ vars.AWS_BLOG_SANDBOX_ACCOUNT_ID }}
          AWS_BLOG_PRODUCTION_ACCOUNT_ID: ${{ vars.AWS_BLOG_PRODUCTION_ACCOUNT_ID }}
      - name: Deploy SandboxHostingStack
        working-directory: infra
        run: npx cdk deploy SandboxHostingStack --require-approval never
        env:
          AWS_BLOG_SANDBOX_ACCOUNT_ID: ${{ vars.AWS_BLOG_SANDBOX_ACCOUNT_ID }}
          AWS_BLOG_PRODUCTION_ACCOUNT_ID: ${{ vars.AWS_BLOG_PRODUCTION_ACCOUNT_ID }}

  production:
    needs: sandbox
    runs-on: ubuntu-slim
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ./.github/actions/setup-node-npm
        with:
          working-directory: infra
      - uses: ./.github/actions/setup-node-npm
        with:
          working-directory: app
      - name: Build app
        working-directory: app
        run: npm run build
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_BLOG_PRODUCTION_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1
      - name: Deploy ProductionGithubDeployRoleStack
        working-directory: infra
        run: npx cdk deploy ProductionGithubDeployRoleStack --require-approval never
        env:
          AWS_BLOG_SANDBOX_ACCOUNT_ID: ${{ vars.AWS_BLOG_SANDBOX_ACCOUNT_ID }}
          AWS_BLOG_PRODUCTION_ACCOUNT_ID: ${{ vars.AWS_BLOG_PRODUCTION_ACCOUNT_ID }}
      # ProductionGithubDeployRoleStack„ĀĆus-east-1„Āł„ĀģAssumeRoleŤ®ĪŚŹĮ„āíŤŅĹŚä†„Āó„ĀüÁõīŚĺĆ„ĀĮ„ÄĀ
      # ŚźĆ„Āėcdk deploy„ā≥„Éě„É≥„ÉČ„Āßus-east-1„Āģstack„āíšłÄśč¨śĆáŚģö„Āô„āč„Ā®„ÄĀCDK„ĀĆCloudFormation
      # śõīśĖįŚģĆšļÜŚČć„Āęus-east-1„Āģasset publishing role„āíŤß£śĪļ„Āó„āą„ĀÜ„Ā®„Āó„Ā¶Ś§Īśēó„Āô„āč„Āü„āĀ„ÄĀ
      # Śą•step„Ā®„Āó„Ā¶IAM PolicyśõīśĖį„ĀģŚŹćśė†ŚĺĆ„ĀęŚģüŤ°Ć„Āô„āč„Äā
      - name: Deploy ProductionDnsStack
        working-directory: infra
        run: npx cdk deploy ProductionDnsStack --require-approval never
        env:
          AWS_BLOG_SANDBOX_ACCOUNT_ID: ${{ vars.AWS_BLOG_SANDBOX_ACCOUNT_ID }}
          AWS_BLOG_PRODUCTION_ACCOUNT_ID: ${{ vars.AWS_BLOG_PRODUCTION_ACCOUNT_ID }}
          SANDBOX_SUBDOMAIN_NAME_SERVERS: ${{ vars.SANDBOX_SUBDOMAIN_NAME_SERVERS }}
